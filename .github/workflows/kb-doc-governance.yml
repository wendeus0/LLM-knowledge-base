name: kb-doc-governance

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  doc-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run documental conformity gate
        run: python -m kb.cli jobs doc-gate --base-ref origin/main

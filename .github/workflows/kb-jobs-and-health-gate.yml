name: kb-jobs-and-health-gate

on:
  workflow_dispatch:
    inputs:
      stale_max_pct:
        description: "Limite máximo de stale_pct para gate"
        required: false
        default: "20"
      disputed_max_pct:
        description: "Limite máximo de disputed_pct para gate"
        required: false
        default: "8"
  schedule:
    - cron: "0 3 * * *"
  pull_request:
    branches: ["main"]
    paths:
      - "kb/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/kb-jobs-and-health-gate.yml"

permissions:
  contents: read

jobs:
  operational-chain:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run operational chain
        run: |
          python -m kb.cli jobs run decay
          python -m kb.cli jobs run contradiction-check
          python -m kb.cli jobs run index-refresh
          python -m kb.cli jobs run health \
            --stale-max-pct "${{ github.event.inputs.stale_max_pct || '20' }}" \
            --disputed-max-pct "${{ github.event.inputs.disputed_max_pct || '8' }}"

  ci-health-gate:
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Strict health gate
        run: |
          python -m kb.cli jobs gate \
            --stale-max-pct "${{ github.event.inputs.stale_max_pct || '20' }}" \
            --disputed-max-pct "${{ github.event.inputs.disputed_max_pct || '8' }}"
